name: Update NSE JSON

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:

  update-json:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Fetch NSE JSON
        run: |

          curl -L \
          -H "user-agent: Mozilla/5.0" \
          -H "accept: application/json" \
          "https://www.nseindia.com/api/option-chain-v3?type=Indices&symbol=NIFTY&expiry=05-May-2026" \
          -o NIFTY_OPTION_CHAIN.json

      - name: Commit JSON
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add NIFTY_OPTION_CHAIN.json

          git commit -m "Auto update JSON" || echo "No changes"

          git push
